{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Стандарты</title>
</head>
<style>
    nav{
        padding: 10px;
        margin-top: 5px;
    }

    .nav-link {
        color: coral;
        font-size: 20px;
        font-weight: 700;
    }

    .nav-link img{
        padding: 5px;
        height: 38px;
        width: 38px;
        background-color: coral;
        border-radius: 8px;
    }

    .nav-items{
        display: flex;
        gap: 15px;
        padding: 15px;
    }

    .nav-items .nav-link{
        box-shadow: rgba(0, 0, 0, 0.25) 0 5px 15px 0;
        border-radius: 5px;
        padding: 4px;
        color: coral;
        font-size: 17px;
        background-color: aliceblue;
        font-weight: 600;
    }

    .nav-items .nav-link:hover{
        color: #1d1d1d;
    }
</style>
<body>
<nav class="navbar">
    <div class="container-fluid">
        <a class="nav-link" href="{% url 'home'%}">
            <img src="https://cdn.icon-icons.com/icons2/38/PNG/512/dumbbell_sport_5072.png" data-size="512" height="32" width="32">
            Антифитнес</a>
        <div class="nav-items">
            <a class="nav-link" href="{% url 'home'%}">Домашняя страница</a>
            <a class="nav-link" href="/admin/">Админ панель</a>
            <a class="nav-link" href="https://t.me/rcbobot">Telegram bot</a>
            <a href="{% url 'standards_create' %}" class="nav-link">Заолнить нормативы</a>
        </div>
    </div>
</nav>
<div class="flex-column flex-md-row p-4 gap-4 py-md-5 align-items-center justify-content-center" style="margin-top: 100px" >

    <div class="list-group">
        {% for standard in data %}
        <a href="{% url 'standards_id' standard.telegram_id%}" class="list-group-item list-group-item-action d-flex gap-3 py-3" aria-current="true" style="border-radius: 10px">
            <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" height="32" width="32">
            <div class="d-flex gap-2 w-100 justify-content-between">
                <div class="container-md">
                    <h6 class="mb-0">Клиент</h6>
                    <p>{{ standard.first_name }}</p>
                </div>
            </div>
        </a><br>
        {% endfor %}
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
