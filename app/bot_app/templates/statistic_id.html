<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Статистика</title>
</head>
<style>
    img{
        padding: 3px;
        background-color: coral;
        height: 32px;
        width: 32px;
        border-radius: 8px;
    }

    .navbar .nav-link{
        font-size: 18px;
        font-weight: 700;
        color: coral;
    }

    .navbar .nav-link:hover{
        color: chocolate;
    }

    .btn{
        background-color: coral;
        font-size: 16px;
        font-weight: 700;
        width: 100%;
    }
    
    .btn:hover{
        background-color: chocolate;
    }
</style>
<body>
<nav class="navbar">
    <a class="nav-link" href="{% url 'home'%}">
        <img src="https://cdn.icon-icons.com/icons2/38/PNG/512/dumbbell_sport_5072.png" data-size="512" height="32" width="32">
        Антифитнес</a>
</nav>
{% load extras %}
<div class="container-md" style="margin-top: 5%">
    <table class="table table-sm table-striped">
        <thead>
        <tr>
            <th scope="col">Пользователи</th>
            <th scope="col">{{year}}</th>
        </tr>
        </thead>
        <tbody>
        {% for el in data %}
        <tr>
            <td>{{ el.user_name }}</td>
            <td>{{el|getattr_safe:norm}}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'statistics_standards' year %}" class="btn">Назад</a><br>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
